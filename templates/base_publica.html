<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces — {% block title %}Loja{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #fdf4ff; color: #1e1b4b; min-height: 100vh; }
        header { background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%); color: white; padding: 0 32px; box-shadow: 0 2px 12px rgba(168,85,247,.3); }
        .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .logo { font-size: 1.2rem; font-weight: 800; }
        nav a { color: rgba(255,255,255,.85); text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: .9rem; font-weight: 600; }
        nav a:hover { background: rgba(255,255,255,.15); color: white; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
        .card { background: white; border-radius: 18px; padding: 30px 34px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 20px rgba(168,85,247,.08); border: 1px solid rgba(168,85,247,.1); }
        .card h2 { font-size: 1.1rem; font-weight: 800; color: #6d28d9; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #f3e8ff; }
        h1.page-title { font-size: 1.6rem; font-weight: 900; color: #6d28d9; margin-bottom: 28px; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
        .form-group label { font-size: .75rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; }
        input, select { padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: .95rem; background: #fafafa; width: 100%; outline: none; transition: border-color .15s, box-shadow .15s; }
        input:focus, select:focus { border-color: #a855f7; background: white; box-shadow: 0 0 0 3px rgba(168,85,247,.12); }
        button, .btn { background: linear-gradient(135deg, #ec4899, #a855f7); color: white; border: none; padding: 11px 24px; border-radius: 10px; font-size: .95rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; transition: all .15s; }
        button:hover, .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(168,85,247,.35); }
        .badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:.78rem; font-weight:700; }
        .badge-yellow { background:#fef9c3; color:#a16207; }
        .badge-blue { background:#dbeafe; color:#1d4ed8; }
        .badge-orange { background:#ffedd5; color:#c2410c; }
        .badge-green { background:#dcfce7; color:#15803d; }
        .badge-gray { background:#f3f4f6; color:#4b5563; }
        .badge-red { background:#fee2e2; color:#dc2626; }
        .badge-purple { background:#ede9fe; color:#6d28d9; }
        table { width:100%; border-collapse:collapse; font-size:.92rem; }
        thead th { text-align:left; padding:10px 14px; background:#fdf4ff; color:#6d28d9; font-weight:700; font-size:.78rem; text-transform:uppercase; letter-spacing:.5px; }
        tbody tr { border-bottom:1px solid #fdf4ff; }
        tbody td { padding:12px 14px; }
        .divider { height:1px; background:#f3e8ff; margin:20px 0; }
        .empty-state { text-align:center; padding:40px; color:#9ca3af; }
        .alert-error { background:#fee2e2; color:#dc2626; border:1px solid #fecaca; padding:14px 18px; border-radius:10px; margin-bottom:18px; font-weight:600; }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <div class="logo">🍫 Nossos Doces</div>
        <nav>
            <a href="/catalogo/">Catálogo</a>
            <a href="/pedido/consulta/">Meu Pedido</a>
        </nav>
    </div>
</header>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
